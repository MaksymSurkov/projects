<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Gallery — WebXR Viewer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d14;
      color: #e0e0e0;
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
      height: 100vh;
    }

    canvas { display: block; }

    /* ===== HUD ===== */
    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10; width: 20px; height: 20px;
      pointer-events: none; display: none;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute;
      background: rgba(255,255,255,0.5);
    }
    #crosshair::before { width: 1px; height: 100%; left: 50%; }
    #crosshair::after  { width: 100%; height: 1px; top: 50%; }

    #mode-indicator {
      position: fixed; top: 14px; left: 14px; z-index: 10;
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: #4dabf7; background: rgba(0,0,0,0.45);
      padding: 7px 13px; border: 1px solid rgba(77,171,247,0.15);
      backdrop-filter: blur(10px);
    }

    /* ===== CONTROLS PANEL ===== */
    #controls-panel {
      position: fixed;
      bottom: 16px; bottom: calc(16px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; gap: 6px;
      flex-wrap: wrap; justify-content: center;
      padding: 0 8px; max-width: 100vw;
    }

    .btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: #888; font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      padding: 10px 16px; min-height: 40px; cursor: pointer;
      transition: all 0.25s; backdrop-filter: blur(10px);
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover { background: rgba(77,171,247,0.1); border-color: #4dabf7; color: #4dabf7; }
    .btn.active { background: rgba(77,171,247,0.15); border-color: #4dabf7; color: #4dabf7; }

    /* ===== XR BUTTONS ===== */
    .xr-btn {
      background: rgba(77,171,247,0.1) !important;
      border: 1px solid rgba(77,171,247,0.3) !important;
      color: #4dabf7 !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 10px !important; letter-spacing: 2px !important;
      text-transform: uppercase !important; padding: 10px 18px !important;
      cursor: pointer !important; position: fixed !important;
      z-index: 20 !important; backdrop-filter: blur(10px) !important;
      transition: all 0.25s !important; min-height: 40px !important;
    }
    #VRButton {
      bottom: 70px !important;
      bottom: calc(70px + env(safe-area-inset-bottom)) !important;
      left: calc(50% - 110px) !important;
    }
    #ARButton {
      bottom: 70px !important;
      bottom: calc(70px + env(safe-area-inset-bottom)) !important;
      left: calc(50% + 5px) !important;
    }

    #xr-status {
      position: fixed; bottom: 110px; left: 50%;
      transform: translateX(-50%);
      z-index: 10; font-size: 9px; color: #333; letter-spacing: 1px;
      text-align: center; white-space: nowrap;
    }
    #xr-status.ok { color: #4dabf7; }

    /* ===== WALK HINT ===== */
    #fps-hint {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 40; background: rgba(0,0,0,0.88);
      padding: 28px 36px; text-align: center;
      border: 1px solid rgba(77,171,247,0.2);
      display: none; cursor: pointer; backdrop-filter: blur(20px);
    }
    #fps-hint h3 { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: #4dabf7; margin-bottom: 14px; }
    #fps-hint p  { font-size: 10px; color: #666; line-height: 2.2; letter-spacing: 0.5px; }
    .key {
      display: inline-block; background: rgba(77,171,247,0.1);
      border: 1px solid rgba(77,171,247,0.3); color: #4dabf7;
      padding: 1px 7px; font-size: 10px; margin: 0 2px;
    }
    #fps-hint .note { margin-top: 14px; font-size: 10px; color: #4dabf7; letter-spacing: 2px; }

    /* ===== AR HINT ===== */
    #ar-hint {
      display: none; position: fixed; bottom: 30%; left: 50%;
      transform: translateX(-50%); z-index: 30; color: #fff;
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      text-align: center; background: rgba(0,0,0,0.5);
      padding: 10px 20px; border: 1px solid rgba(255,255,255,0.2);
      pointer-events: none;
    }

    /* ===== VR HINT ===== */
    #vr-hint {
      display: none; position: fixed; bottom: 30%; left: 50%;
      transform: translateX(-50%); z-index: 30; color: #fff;
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      text-align: center; background: rgba(0,0,0,0.5);
      padding: 10px 20px; border: 1px solid rgba(77,171,247,0.3);
      pointer-events: none;
    }

    /* ===== LOADING ===== */
    #loading {
      position: fixed; inset: 0; z-index: 200;
      background: #0d0d14;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
    }
    #loading.hidden { display: none; }
    #loading p { font-size: 12px; color: #4dabf7; letter-spacing: 2px; }
    .spinner {
      width: 30px; height: 30px;
      border: 2px solid rgba(77,171,247,0.15);
      border-top-color: #4dabf7; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== INFO HOTSPOTS ===== */
    #hotspots-container { position: fixed; inset: 0; pointer-events: none; z-index: 15; }

    .info-hotspot {
      position: fixed; width: 28px; height: 28px; border-radius: 50%;
      background: rgba(77,171,247,0.85); border: 2px solid #fff;
      cursor: pointer; transform: translate(-50%,-50%);
      pointer-events: auto; transition: transform 0.2s, background 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .info-hotspot::after { content: 'i'; color: #fff; font-size: 13px; font-weight: 700; line-height: 1; }
    .info-hotspot:hover { transform: translate(-50%,-50%) scale(1.25); background: rgba(77,171,247,1); }
    .info-hotspot-label {
      position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.9); color: #e0e0e0;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: 1px; white-space: nowrap; padding: 6px 14px;
      border: 1px solid rgba(77,171,247,0.4); pointer-events: none;
      opacity: 0; transition: opacity 0.15s;
    }
    .info-hotspot:hover .info-hotspot-label { opacity: 1; }

    .info-hotspot.ar-mode { width: 18px; height: 18px; border-width: 1.5px; }
    .info-hotspot.ar-mode::after { font-size: 9px; }
    .info-hotspot.ar-mode .info-hotspot-label { font-size: 9px; padding: 3px 8px; bottom: 22px; }

    /* ===== MOBILE ===== */
    @media (max-width: 600px) {
      .btn { font-size: 9px; padding: 10px 11px; }
      #VRButton { left: 50% !important; transform: translateX(calc(-100% - 5px)) !important; }
      #ARButton { left: 50% !important; transform: translateX(5px) !important; }
      #VRButton, #ARButton {
        bottom: 80px !important;
        bottom: calc(80px + env(safe-area-inset-bottom)) !important;
        font-size: 9px !important; padding: 10px 13px !important;
      }
      #xr-status { bottom: 125px; font-size: 8px; }
    }
  </style>
</head>
<body>

<div id="crosshair"></div>
<div id="hotspots-container"></div>
<div id="mode-indicator">Orbit</div>
<div id="xr-status">Checking WebXR...</div>
<div id="ar-hint">Move phone slowly · point at floor</div>
<div id="vr-hint">Point controller at floor · pull trigger to teleport</div>

<div id="controls-panel">
  <button class="btn active" id="btn-orbit" onclick="setOrbitMode()">Orbit</button>
  <button class="btn"        id="btn-walk"  onclick="enterFPSMode()">Walk</button>
</div>

<div id="fps-hint" onclick="lockPointer()">
  <h3>Walk Mode</h3>
  <p>
    <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> — move<br>
    <span class="key">Mouse</span> — look around<br>
    <span class="key">Shift</span> — run &nbsp; <span class="key">Esc</span> — exit
  </p>
  <p class="note">Tap to start</p>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p id="loading-text">Loading Art Gallery...</p>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls }       from 'three/addons/controls/OrbitControls.js';
  import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
  import { GLTFLoader }          from 'three/addons/loaders/GLTFLoader.js';
  import { DRACOLoader }         from 'three/addons/loaders/DRACOLoader.js';
  import { VRButton }            from 'three/addons/webxr/VRButton.js';
  import { ARButton }            from 'three/addons/webxr/ARButton.js';
  import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

  const _params   = new URLSearchParams(location.search);
  const _isEmbed  = _params.get('embed') === '1';   // iframe mode — no XR buttons
  const _autoAR   = _params.get('ar')    === '1';   // direct link — show AR prompt

  // ── SCENE ──────────────────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0d0d14, 0.03);

  const camera = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.01, 500);
  camera.position.set(0, 1.7, 5);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setClearColor(0x0d0d14);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  // ── LIGHTS ─────────────────────────────────────────────────────────
  const hemiLight = new THREE.HemisphereLight(0xd0e0f0, 0x2a2a3a, 0.7);
  scene.add(hemiLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 1.3);
  dirLight.position.set(5, 10, 5);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(1024, 1024);
  dirLight.shadow.camera.near = 0.1; dirLight.shadow.camera.far = 50;
  dirLight.shadow.camera.left = -15; dirLight.shadow.camera.right = 15;
  dirLight.shadow.camera.top = 15;  dirLight.shadow.camera.bottom = -15;
  scene.add(dirLight);
  scene.add(new THREE.DirectionalLight(0x4dabf7, 0.3).position.set(-5,3,-5) && new THREE.DirectionalLight(0x4dabf7, 0.3));

  const fillLight = new THREE.DirectionalLight(0x4dabf7, 0.3);
  fillLight.position.set(-5, 3, -5);
  scene.add(fillLight);

  const grid = new THREE.GridHelper(30, 60, 0x1a1a2e, 0x141422);
  scene.add(grid);

  const shadowFloor = new THREE.Mesh(
    new THREE.PlaneGeometry(30, 30),
    new THREE.ShadowMaterial({ opacity: 0.3 })
  );
  shadowFloor.rotation.x = -Math.PI / 2;
  shadowFloor.position.y = -0.01;
  shadowFloor.receiveShadow = true;
  scene.add(shadowFloor);

  // ── CONTROLS ───────────────────────────────────────────────────────
  const orbitControls = new OrbitControls(camera, renderer.domElement);
  orbitControls.enableDamping = true;
  orbitControls.dampingFactor = 0.08;
  orbitControls.enableZoom = false;
  orbitControls.minDistance = 0.3;
  orbitControls.maxDistance = 50;

  const fpsControls = new PointerLockControls(camera, document.body);
  let currentMode = 'orbit';
  const WALK_SPEED = 3.0, RUN_SPEED = 7.0, PLAYER_HEIGHT = 1.7;
  const keys = { forward: false, backward: false, left: false, right: false, shift: false };
  const velocity = new THREE.Vector3();
  const direction = new THREE.Vector3();

  function setOrbitMode() {
    currentMode = 'orbit';
    orbitControls.enabled = true;
    fpsControls.unlock();
    document.getElementById('crosshair').style.display = 'none';
    document.getElementById('fps-hint').style.display = 'none';
    document.getElementById('mode-indicator').textContent = 'Orbit';
    document.getElementById('btn-orbit').classList.add('active');
    document.getElementById('btn-walk').classList.remove('active');
  }
  window.setOrbitMode = setOrbitMode;

  function enterFPSMode() {
    currentMode = 'fps';
    orbitControls.enabled = false;
    camera.position.y = Math.max(camera.position.y, PLAYER_HEIGHT);
    document.getElementById('fps-hint').style.display = 'block';
    document.getElementById('mode-indicator').textContent = 'Walk';
    document.getElementById('btn-orbit').classList.remove('active');
    document.getElementById('btn-walk').classList.add('active');
  }
  window.enterFPSMode = enterFPSMode;

  function lockPointer() { fpsControls.lock(); }
  window.lockPointer = lockPointer;

  fpsControls.addEventListener('lock', () => {
    document.getElementById('fps-hint').style.display = 'none';
    document.getElementById('crosshair').style.display = 'block';
  });
  fpsControls.addEventListener('unlock', () => {
    document.getElementById('crosshair').style.display = 'none';
    if (currentMode === 'fps') document.getElementById('fps-hint').style.display = 'block';
  });

  document.addEventListener('keydown', e => {
    if (e.code === 'KeyW' || e.code === 'ArrowUp')    keys.forward = true;
    if (e.code === 'KeyS' || e.code === 'ArrowDown')  keys.backward = true;
    if (e.code === 'KeyA' || e.code === 'ArrowLeft')  keys.left = true;
    if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = true;
    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.shift = true;
    if (e.code === 'Escape' && currentMode === 'fps') setOrbitMode();
    if (e.code === 'Space') e.preventDefault();
  });
  document.addEventListener('keyup', e => {
    if (e.code === 'KeyW' || e.code === 'ArrowUp')    keys.forward = false;
    if (e.code === 'KeyS' || e.code === 'ArrowDown')  keys.backward = false;
    if (e.code === 'KeyA' || e.code === 'ArrowLeft')  keys.left = false;
    if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = false;
    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.shift = false;
  });

  // ── VR CONTROLLERS ─────────────────────────────────────────────────
  const cmFactory = new XRControllerModelFactory();

  const ctrl0 = renderer.xr.getController(0);
  const ctrl1 = renderer.xr.getController(1);
  scene.add(ctrl0); scene.add(ctrl1);
  scene.add(renderer.xr.getControllerGrip(0)); scene.add(renderer.xr.getControllerGrip(1));

  const lineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-5)
  ]);
  const lineMat = new THREE.LineBasicMaterial({ color: 0x4dabf7, transparent: true, opacity: 0.6 });
  ctrl0.add(new THREE.Line(lineGeo.clone(), lineMat.clone()));
  ctrl1.add(new THREE.Line(lineGeo.clone(), lineMat.clone()));

  // VR teleport — официальный паттерн Three.js
  // Сохраняем baseReferenceSpace при старте сессии для корректного телепорта
  let baseReferenceSpace = null;

  function onVRSelect(event) {
    if (!currentModel) return;
    const controller = event.target;

    const mat = new THREE.Matrix4().identity().extractRotation(controller.matrixWorld);
    const ray = new THREE.Raycaster();
    ray.ray.origin.setFromMatrixPosition(controller.matrixWorld);
    ray.ray.direction.set(0, 0, -1).applyMatrix4(mat);

    const hits = ray.intersectObject(currentModel, true);
    for (const hit of hits) {
      if (!hit.face) continue;
      // Проверяем мировую нормаль (не локальную!)
      const worldNormal = hit.face.normal.clone().transformDirection(hit.object.matrixWorld);
      if (worldNormal.y < 0.7) continue;

      const pos = hit.point;
      // Корректный телепорт: сдвигаем reference space так чтобы игрок оказался над точкой
      const ref = baseReferenceSpace || renderer.xr.getReferenceSpace();
      if (!ref) break;
      const transform = new XRRigidTransform({ x: -pos.x, y: -pos.y, z: -pos.z, w: 1 });
      renderer.xr.setReferenceSpace(ref.getOffsetReferenceSpace(transform));
      break;
    }
  }

  ctrl0.addEventListener('select', e => {
    if (!renderer.xr.isPresenting) return;
    // AR: arReticle видим → размещаем модель
    if (arReticle.visible) { onARSelect(); return; }
    // VR: телепорт
    onVRSelect(e);
  });
  ctrl1.addEventListener('select', e => {
    if (!renderer.xr.isPresenting) return;
    if (arReticle.visible) { onARSelect(); return; }
    onVRSelect(e);
  });

  // ── AR ─────────────────────────────────────────────────────────────
  let hitTestSource = null;
  let hitTestSourceRequested = false;
  let arPlacedModel = null;
  let _arSavedCamPos = new THREE.Vector3();
  let _arSavedTarget = new THREE.Vector3();
  let _arRestoreCamera = false;

  const arReticle = new THREE.Mesh(
    new THREE.RingGeometry(0.1, 0.15, 32).rotateX(-Math.PI / 2),
    new THREE.MeshBasicMaterial({ color: 0x4dabf7, side: THREE.DoubleSide })
  );
  arReticle.matrixAutoUpdate = false;
  arReticle.visible = false;
  scene.add(arReticle);

  function onARSelect() {
    if (!arReticle.visible) return;
    const pos = new THREE.Vector3().setFromMatrixPosition(arReticle.matrix);

    if (!arPlacedModel) {
      // Reuse the original model (already removed from scene at sessionstart) — no clone, no extra memory
      const wrapper = new THREE.Group();
      if (currentModel) {
        currentModel.visible = true;
        // Center model inside wrapper
        const box = new THREE.Box3().setFromObject(currentModel);
        const center = box.getCenter(new THREE.Vector3());
        currentModel.position.set(-center.x, -box.min.y, -center.z);
        wrapper.add(currentModel);
      }
      arPlacedModel = wrapper;
      scene.add(arPlacedModel);
    }

    arPlacedModel.position.copy(pos);
    const euler = new THREE.Euler().setFromRotationMatrix(arReticle.matrix, 'YXZ');
    arPlacedModel.rotation.set(0, euler.y, 0);
    document.getElementById('ar-hint').style.display = 'none';
  }

  // ── XR SESSION EVENTS ──────────────────────────────────────────────
  renderer.xr.addEventListener('sessionstart', () => {
    const session = renderer.xr.getSession();
    if (!session) return;

    baseReferenceSpace = renderer.xr.getReferenceSpace();

    const isAR = session.environmentBlendMode !== 'opaque';
    if (isAR) {
      renderer.setClearColor(0x000000, 0);
      document.getElementById('ar-hint').style.display = 'block';
      document.getElementById('vr-hint').style.display = 'none';
    } else {
      // VR
      document.getElementById('vr-hint').style.display = 'block';
      document.getElementById('ar-hint').style.display = 'none';
    }

    _arSavedCamPos.copy(camera.position);
    _arSavedTarget.copy(orbitControls.target);

    if (scene.fog) scene.fog.density = 0;
    // These may already be removed by the pre-click handler — scene.remove is safe to call twice
    scene.remove(grid);
    scene.remove(shadowFloor);
    if (currentModel) scene.remove(currentModel);
    hemiLight.intensity = isAR ? 2.0 : 0.7;
    dirLight.intensity  = isAR ? 3.0 : 1.3;
    navReticle.visible = false;
    orbitControls.enabled = false;
    presetWaypoints.forEach(wp => { wp.marker.visible = false; });

    renderer.shadowMap.enabled = false;
    renderer.setPixelRatio(1);

    session.addEventListener('select', () => {
      if (arReticle.visible) onARSelect();
    });
    session.addEventListener('end', () => {
      hitTestSource = null;
      hitTestSourceRequested = false;
      baseReferenceSpace = null;
    });
  });

  renderer.xr.addEventListener('sessionend', () => {
    // Reload is the only reliable way to restore state after AR on mobile.
    // Any attempt to manually restore scene/camera leads to white screen or GPU issues.
    location.reload();
  });

  // ── XR BUTTONS ─────────────────────────────────────────────────────
  // In embed mode (?embed=1) — no XR buttons at all.
  // In standalone mode — use Three.js VRButton/ARButton (battle-tested).
  // In ?ar=1 mode — additionally show an AR launch overlay on top.
  const xrSt = document.getElementById('xr-status');

  if (_isEmbed) {
    if (xrSt) xrSt.style.display = 'none';
  } else {
    const vrBtn = VRButton.createButton(renderer);
    vrBtn.classList.add('xr-btn');
    document.body.appendChild(vrBtn);

    const arBtn = ARButton.createButton(renderer, {
      requiredFeatures: ['hit-test'],
      optionalFeatures: ['dom-overlay'],
      domOverlay: { root: document.body }
    });
    arBtn.classList.add('xr-btn');
    document.body.appendChild(arBtn);

    // Status line
    if (!('xr' in navigator)) {
      xrSt.textContent = 'WebXR not supported';
    } else {
      Promise.allSettled([
        navigator.xr.isSessionSupported('immersive-vr'),
        navigator.xr.isSessionSupported('immersive-ar')
      ]).then(([vr, ar]) => {
        const hasVR = vr.value === true, hasAR = ar.value === true;
        xrSt.textContent = `VR ${hasVR ? '✓' : '✗'} · AR ${hasAR ? '✓' : '✗'}`;
        if (hasVR || hasAR) xrSt.classList.add('ok');

        // ?ar=1 — show a big tap-to-start AR overlay so user doesn't miss the button
        if (_autoAR && hasAR) {
          const ov = document.createElement('div');
          ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;font-family:inherit;';
          ov.innerHTML = `
            <div style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#4dabf7;">Augmented Reality</div>
            <div style="font-size:10px;color:#555;letter-spacing:2px;text-transform:uppercase;">Point your camera at a flat surface · tap to place</div>
            <button style="background:rgba(77,171,247,0.15);border:1px solid #4dabf7;color:#4dabf7;font-family:inherit;font-size:12px;letter-spacing:3px;text-transform:uppercase;padding:18px 48px;cursor:pointer;">TAP TO START AR</button>`;
          document.body.appendChild(ov);
          ov.querySelector('button').addEventListener('click', () => { ov.remove(); arBtn.click(); });
        }
      });
    }
  }

  // ── MODEL ──────────────────────────────────────────────────────────
  const gltfLoader = new GLTFLoader();
  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
  gltfLoader.setDRACOLoader(dracoLoader);

  let currentModel = null;

  gltfLoader.load(
    './art_gallery_tour.glb',
    gltf => {
      const model = gltf.scene;
      model.traverse(child => {
        if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
      });

      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      let scale = 1;
      if (maxDim < 1) scale = 5 / maxDim;
      else if (maxDim > 100) scale = 20 / maxDim;
      model.scale.setScalar(scale);

      const sb = new THREE.Box3().setFromObject(model);
      const sc = sb.getCenter(new THREE.Vector3());
      model.position.x -= sc.x;
      model.position.z -= sc.z;
      model.position.y -= sb.min.y;

      scene.add(model);
      currentModel = model;

      const fb = new THREE.Box3().setFromObject(model);
      autoGenerateWaypoints(model, fb);
      startInsideRoom();

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('position-display') && (document.getElementById('position-display').style.display = 'block');
    },
    prog => {
      if (prog.total > 0) {
        const pct = Math.round(prog.loaded / prog.total * 100);
        document.getElementById('loading-text').textContent = `Loading... ${pct}%`;
      }
    },
    err => {
      console.error(err);
      document.getElementById('loading-text').textContent = 'Error loading model. Run local server.';
    }
  );

  // ── NAVIGATION ─────────────────────────────────────────────────────
  let navAnimating = false, onNavAnimEnd = null, navAnimProgress = 0;
  const navAnimFrom = { cam: new THREE.Vector3(), target: new THREE.Vector3() };
  const navAnimTo   = { cam: new THREE.Vector3(), target: new THREE.Vector3() };
  let navHitPoint = null, hoveredWaypoint = null;

  const navReticle = new THREE.Group();
  const navRing = new THREE.Mesh(
    new THREE.RingGeometry(0.18, 0.26, 32).rotateX(-Math.PI / 2),
    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85, depthTest: false, side: THREE.DoubleSide })
  );
  navRing.renderOrder = 20;
  navReticle.add(navRing);
  const navDot = new THREE.Mesh(
    new THREE.CircleGeometry(0.05, 16).rotateX(-Math.PI / 2),
    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9, depthTest: false })
  );
  navDot.renderOrder = 20;
  navReticle.add(navDot);
  navReticle.visible = false;
  scene.add(navReticle);

  const presetWaypoints = [];
  let currentWpIndex = -1;

  function createPresetMarker() {
    const g = new THREE.Group();
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(0.22, 0.32, 32).rotateX(-Math.PI / 2),
      new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.25, depthTest: false, side: THREE.DoubleSide })
    );
    ring.renderOrder = 15; g.add(ring);
    const dot = new THREE.Mesh(
      new THREE.CircleGeometry(0.07, 16).rotateX(-Math.PI / 2),
      new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3, depthTest: false })
    );
    dot.renderOrder = 15; g.add(dot);
    g.userData.isPresetWaypoint = true;
    return g;
  }

  function findFloorY(model, x, z, top) {
    const ray = new THREE.Raycaster();
    ray.set(new THREE.Vector3(x, top, z), new THREE.Vector3(0, -1, 0));
    const hits = ray.intersectObject(model, true);
    let best = null;
    for (const hit of hits) {
      if (!hit.face) continue;
      const wn = hit.face.normal.clone().transformDirection(hit.object.matrixWorld);
      if (wn.y > 0.5 && (best === null || hit.point.y < best)) best = hit.point.y;
    }
    return best;
  }

  function isInsideBuilding(model, pos, maxD) {
    const origin = pos.clone(); origin.y += 1;
    const dirs = [new THREE.Vector3(1,0,0), new THREE.Vector3(-1,0,0), new THREE.Vector3(0,0,1), new THREE.Vector3(0,0,-1)];
    const ray = new THREE.Raycaster(); ray.far = maxD;
    let walls = 0;
    for (const d of dirs) { ray.set(origin, d); if (ray.intersectObject(model, true).length > 0) walls++; }
    return walls >= 2;
  }

  function autoGenerateWaypoints(model, bbox) {
    presetWaypoints.forEach(wp => scene.remove(wp.marker));
    presetWaypoints.length = 0; currentWpIndex = -1;

    const size = bbox.getSize(new THREE.Vector3());
    const top  = bbox.max.y + 1;
    const step = Math.max(1.0, Math.min(size.x, size.z) / 8);
    const floorPts = [], allY = [];
    const xN = Math.ceil(size.x / step) + 1, zN = Math.ceil(size.z / step) + 1;

    for (let xi = 0; xi < xN; xi++) for (let zi = 0; zi < zN; zi++) {
      const x = bbox.min.x + xi * step, z = bbox.min.z + zi * step;
      const y = findFloorY(model, x, z, top);
      if (y !== null) { floorPts.push(new THREE.Vector3(x, y, z)); allY.push(y); }
    }
    if (floorPts.length < 3) return;

    allY.sort((a, b) => a - b);
    const floorY = allY[Math.floor(allY.length * 0.1)];
    const tol = Math.max(0.4, size.y * 0.08);
    const groundPts = floorPts.filter(p => Math.abs(p.y - floorY) <= tol);
    if (groundPts.length < 3) return;

    const maxD = Math.min(25, Math.max(size.x, size.z) * 0.4);
    const interior = groundPts.filter(p => isInsideBuilding(model, p, maxD));
    const pts = interior.length >= 3 ? interior : groundPts;

    let ptA = pts[0], maxD1 = 0;
    for (const p of pts) { const d = p.distanceTo(pts[0]); if (d > maxD1) { maxD1 = d; ptA = p; } }
    let ptC = pts[0], maxD2 = 0;
    for (const p of pts) { const d = p.distanceTo(ptA); if (d > maxD2) { maxD2 = d; ptC = p; } }

    const nearest = t => {
      let best = pts[0];
      for (const p of pts) if (p.distanceTo(t) < best.distanceTo(t)) best = p;
      return best;
    };
    const ptB = nearest(ptA.clone().lerp(ptC, 1/3));
    const ptD = nearest(ptA.clone().lerp(ptC, 2/3));

    for (const pos of [ptA, ptB, ptD, ptC]) {
      const marker = createPresetMarker();
      marker.position.copy(pos); marker.position.y += 0.015;
      scene.add(marker);
      presetWaypoints.push({ position: pos.clone(), marker });
    }
  }

  function startInsideRoom() {
    if (!presetWaypoints.length) return;
    currentWpIndex = 0;
    const p = presetWaypoints[0].position;
    camera.position.set(p.x, p.y + PLAYER_HEIGHT, p.z);
    const look = presetWaypoints.length > 1 ? presetWaypoints[1].position : new THREE.Vector3(p.x+1, p.y, p.z);
    const fwd = new THREE.Vector3(look.x - p.x, 0, look.z - p.z).normalize();
    if (fwd.length() < 0.01) fwd.set(0, 0, -1);
    orbitControls.target.copy(camera.position).addScaledVector(fwd, 2.0);
    orbitControls.update();
  }

  function flyTo(dest) {
    const destCam = new THREE.Vector3(dest.x, dest.y + PLAYER_HEIGHT, dest.z);
    const lookDir = new THREE.Vector3(); camera.getWorldDirection(lookDir);
    navAnimFrom.cam.copy(camera.position); navAnimFrom.target.copy(orbitControls.target);
    navAnimTo.cam.copy(destCam); navAnimTo.target.copy(destCam.clone().addScaledVector(lookDir, 2.0));
    navAnimProgress = 0; navAnimating = true;
    if (currentMode === 'fps') { fpsControls.unlock(); setOrbitMode(); }
  }

  function flyToHotspot(hs) {
    if (!currentModel) return;
    const origin = hs.position.clone(); origin.y += 0.05;
    const scanRay = new THREE.Raycaster(); scanRay.far = 30;
    let wallDir = new THREE.Vector3(1, 0, 0), minDist = Infinity;
    for (let i = 0; i < 24; i++) {
      const angle = (i / 24) * Math.PI * 2;
      const dir = new THREE.Vector3(Math.cos(angle), 0, Math.sin(angle));
      scanRay.set(origin, dir);
      const hits = scanRay.intersectObject(currentModel, true);
      if (hits.length > 0 && hits[0].distance < minDist) { minDist = hits[0].distance; wallDir = dir.clone(); }
    }
    const bestDir = wallDir.clone().negate();
    const destCam = new THREE.Vector3(
      hs.position.x + bestDir.x * 1.5, camera.position.y, hs.position.z + bestDir.z * 1.5
    );
    navAnimFrom.cam.copy(camera.position); navAnimFrom.target.copy(orbitControls.target);
    navAnimTo.cam.copy(destCam); navAnimTo.target.copy(hs.position.clone());
    navAnimProgress = 0; navAnimating = true;
    if (currentMode === 'fps') { fpsControls.unlock(); setOrbitMode(); }
  }

  // ── MOUSE NAVIGATION ───────────────────────────────────────────────
  const navRaycaster = new THREE.Raycaster();
  const navMouse = new THREE.Vector2();
  let navMouseDownX = 0, navMouseDownY = 0;
  const _up = new THREE.Vector3(0, 1, 0);

  renderer.domElement.addEventListener('mousedown', e => { navMouseDownX = e.clientX; navMouseDownY = e.clientY; });

  renderer.domElement.addEventListener('mousemove', e => {
    if (renderer.xr.isPresenting || !currentModel || currentMode === 'fps') {
      navReticle.visible = false; navHitPoint = null;
      if (hoveredWaypoint) {
        hoveredWaypoint.marker.children[0].material.opacity = 0.25;
        hoveredWaypoint.marker.children[1].material.opacity = 0.3;
        hoveredWaypoint = null;
      }
      renderer.domElement.style.cursor = 'default'; return;
    }
    navMouse.x = (e.clientX / innerWidth) * 2 - 1;
    navMouse.y = -(e.clientY / innerHeight) * 2 + 1;
    navRaycaster.setFromCamera(navMouse, camera);

    const wpMeshes = [];
    presetWaypoints.forEach(wp => wp.marker.children.forEach(c => wpMeshes.push(c)));
    const wpHits = navRaycaster.intersectObjects(wpMeshes);

    if (hoveredWaypoint) {
      hoveredWaypoint.marker.children[0].material.opacity = 0.25;
      hoveredWaypoint.marker.children[1].material.opacity = 0.3;
      hoveredWaypoint = null;
    }
    if (wpHits.length > 0) {
      for (const wp of presetWaypoints) {
        if (wp.marker.children.includes(wpHits[0].object)) {
          hoveredWaypoint = wp;
          wp.marker.children[0].material.opacity = 0.9;
          wp.marker.children[1].material.opacity = 0.95;
          break;
        }
      }
      navReticle.visible = false; navHitPoint = null;
      renderer.domElement.style.cursor = 'pointer'; return;
    }

    renderer.domElement.style.cursor = 'default';
    const hits = navRaycaster.intersectObject(currentModel, true);
    navHitPoint = null; navReticle.visible = false;

    for (const hit of hits) {
      if (!hit.face) continue;
      const wn = hit.face.normal.clone().transformDirection(hit.object.matrixWorld).normalize();
      const isFloor = wn.y > 0.5, isWall = Math.abs(wn.y) < 0.3;
      if (!isFloor && !isWall) continue;

      navReticle.position.copy(hit.point).addScaledVector(wn, 0.018);
      navReticle.quaternion.setFromUnitVectors(_up, wn);
      navReticle.visible = true;
      renderer.domElement.style.cursor = 'pointer';

      if (isFloor) {
        navHitPoint = hit.point.clone();
      } else {
        const base = hit.point.clone().addScaledVector(wn, 0.5);
        const dr = new THREE.Raycaster(base.clone().setY(base.y + 0.5), new THREE.Vector3(0,-1,0));
        const fh = dr.intersectObject(currentModel, true);
        let fy = base.y;
        for (const f of fh) {
          if (!f.face) continue;
          const fn = f.face.normal.clone().transformDirection(f.object.matrixWorld).normalize();
          if (fn.y > 0.5) { fy = f.point.y; break; }
        }
        navHitPoint = new THREE.Vector3(base.x, fy, base.z);
      }
      break;
    }
  });

  renderer.domElement.addEventListener('mouseleave', () => {
    navReticle.visible = false; navHitPoint = null;
    if (hoveredWaypoint) {
      hoveredWaypoint.marker.children[0].material.opacity = 0.25;
      hoveredWaypoint.marker.children[1].material.opacity = 0.3;
      hoveredWaypoint = null;
    }
  });

  renderer.domElement.addEventListener('click', e => {
    if (renderer.xr.isPresenting || currentMode === 'fps' && fpsControls.isLocked) return;
    const dx = e.clientX - navMouseDownX, dy = e.clientY - navMouseDownY;
    if (Math.sqrt(dx*dx + dy*dy) > 5) return;
    if (hoveredWaypoint) { currentWpIndex = presetWaypoints.indexOf(hoveredWaypoint); flyTo(hoveredWaypoint.position); return; }
    if (navHitPoint) flyTo(navHitPoint);
  });

  let scrollThrottle = false;
  renderer.domElement.addEventListener('wheel', e => {
    e.preventDefault();
    if (renderer.xr.isPresenting || !presetWaypoints.length || scrollThrottle || navAnimating) return;
    const fwd = new THREE.Vector3(); camera.getWorldDirection(fwd); fwd.y = 0; fwd.normalize();
    const pathDir = new THREE.Vector3().subVectors(
      presetWaypoints[presetWaypoints.length-1].position, presetWaypoints[0].position
    ).normalize();
    const aligned = fwd.dot(pathDir) >= 0;
    const rawDir = e.deltaY > 0 ? -1 : 1;
    const dir = aligned ? rawDir : -rawDir;
    const next = currentWpIndex + dir;
    if (next < 0 || next >= presetWaypoints.length) return;
    scrollThrottle = true; currentWpIndex = next;
    flyTo(presetWaypoints[currentWpIndex].position);
    onNavAnimEnd = () => { onNavAnimEnd = null; setTimeout(() => { scrollThrottle = false; }, 400); };
  }, { passive: false });

  // ── INFO HOTSPOTS ──────────────────────────────────────────────────
  const infoHotspots = [];
  const hsContainer = document.getElementById('hotspots-container');

  function addInfoHotspot(position, label) {
    const el = document.createElement('div');
    el.className = 'info-hotspot';
    el.style.display = 'none';
    el.innerHTML = `<div class="info-hotspot-label">${label}</div>`;
    hsContainer.appendChild(el);
    const hs = { position: position.clone(), el };
    infoHotspots.push(hs);
    el.addEventListener('click', ev => { ev.stopPropagation(); flyToHotspot(hs); });
  }

  addInfoHotspot(new THREE.Vector3(-3.652,  2.023,  1.318), 'Dog');
  addInfoHotspot(new THREE.Vector3(-2.223,  1.946, -3.315), 'Ferris Wheel');
  addInfoHotspot(new THREE.Vector3(-7.003,  2.022,  0.776), 'Horse');
  addInfoHotspot(new THREE.Vector3(-8.966,  2.051, -0.960), 'Woman');
  addInfoHotspot(new THREE.Vector3(-14.604, 1.968, -0.956), 'Car');
  addInfoHotspot(new THREE.Vector3(-14.310, 2.081,  0.767), 'Boat');
  addInfoHotspot(new THREE.Vector3(-20.926, 1.538, -0.026), 'Ball');

  const _occRay  = new THREE.Raycaster();
  const _hsWorld = new THREE.Vector3();
  const _hsScrn  = new THREE.Vector3();

  function updateInfoHotspots() {
    if (renderer.xr.isPresenting) {
      if (arPlacedModel && arPlacedModel.children.length > 0) {
        arPlacedModel.updateMatrixWorld(true);
        const child = arPlacedModel.children[0];
        for (const hs of infoHotspots) {
          _hsWorld.copy(hs.position).add(child.position);
          arPlacedModel.localToWorld(_hsWorld);
          _hsScrn.copy(_hsWorld).project(camera);
          if (_hsScrn.z > 1) { hs.el.style.display = 'none'; continue; }
          hs.el.style.left = (_hsScrn.x * 0.5 + 0.5) * innerWidth + 'px';
          hs.el.style.top  = (-_hsScrn.y * 0.5 + 0.5) * innerHeight + 'px';
          hs.el.classList.add('ar-mode');
          hs.el.style.display = 'flex';
        }
      } else {
        infoHotspots.forEach(hs => { hs.el.style.display = 'none'; });
      }
      return;
    }

    if (!currentModel || !currentModel.parent) {
      infoHotspots.forEach(hs => { hs.el.style.display = 'none'; }); return;
    }
    const camPos = camera.position.clone();
    for (const hs of infoHotspots) {
      _hsScrn.copy(hs.position).project(camera);
      if (_hsScrn.z > 1) { hs.el.style.display = 'none'; continue; }
      const toHs = new THREE.Vector3().subVectors(hs.position, camPos);
      const dist = toHs.length();
      _occRay.set(camPos, toHs.normalize()); _occRay.far = dist - 0.08;
      if (_occRay.intersectObject(currentModel, true).length > 0) { hs.el.style.display = 'none'; continue; }
      hs.el.style.left = (_hsScrn.x * 0.5 + 0.5) * innerWidth + 'px';
      hs.el.style.top  = (-_hsScrn.y * 0.5 + 0.5) * innerHeight + 'px';
      hs.el.classList.remove('ar-mode');
      hs.el.style.display = 'flex';
    }
  }

  // ── CAMERA CONFINE ─────────────────────────────────────────────────
  const _confRay = new THREE.Raycaster();
  const _wallDirs = [
    new THREE.Vector3(1,0,0), new THREE.Vector3(-1,0,0),
    new THREE.Vector3(0,0,1), new THREE.Vector3(0,0,-1),
    new THREE.Vector3(0,1,0)
  ];
  const CONFINE = 0.25, FLOOR_M = 0.15;

  function constrainCamera() {
    if (!currentModel || renderer.xr.isPresenting) return;
    _confRay.set(new THREE.Vector3(camera.position.x, camera.position.y + 0.6, camera.position.z), new THREE.Vector3(0,-1,0));
    _confRay.far = 0.6 + FLOOR_M;
    for (const fh of _confRay.intersectObject(currentModel, true)) {
      if (!fh.face) continue;
      const fn = fh.face.normal.clone().transformDirection(fh.object.matrixWorld).normalize();
      if (fn.y > 0.5) { const minY = fh.point.y + FLOOR_M; if (camera.position.y < minY) camera.position.y = minY; break; }
    }
    if (navAnimating) return;
    let pushed = false;
    for (const dir of _wallDirs) {
      _confRay.set(camera.position, dir); _confRay.far = CONFINE;
      const hits = _confRay.intersectObject(currentModel, true);
      if (hits.length > 0) { camera.position.addScaledVector(dir, -(CONFINE - hits[0].distance)); pushed = true; }
    }
    if (pushed && currentMode === 'orbit') {
      const fwd = new THREE.Vector3(); camera.getWorldDirection(fwd);
      orbitControls.target.copy(camera.position).addScaledVector(fwd, 2.0);
    }
  }

  // ── ANIMATION LOOP ─────────────────────────────────────────────────
  const clock = new THREE.Clock();

  renderer.setAnimationLoop((timestamp, frame) => {
    const delta = clock.getDelta();

    // Восстановление камеры после выхода из AR/VR
    if (_arRestoreCamera && !renderer.xr.isPresenting) {
      _arRestoreCamera = false;
      camera.position.copy(_arSavedCamPos);
      orbitControls.target.copy(_arSavedTarget);
      orbitControls.update();
    }

    if (!renderer.xr.isPresenting) {
      if (currentMode === 'fps' && fpsControls.isLocked) {
        const speed = keys.shift ? RUN_SPEED : WALK_SPEED;
        velocity.x *= 0.85; velocity.z *= 0.85;
        direction.z = Number(keys.forward) - Number(keys.backward);
        direction.x = Number(keys.right)   - Number(keys.left);
        direction.normalize();
        if (keys.forward || keys.backward) velocity.z -= direction.z * speed * delta;
        if (keys.left    || keys.right)    velocity.x -= direction.x * speed * delta;
        fpsControls.moveRight(-velocity.x);
        fpsControls.moveForward(-velocity.z);
      }
      if (currentMode === 'orbit') {
        if (!navAnimating) {
          const fwd = new THREE.Vector3(); camera.getWorldDirection(fwd);
          orbitControls.target.copy(camera.position).addScaledVector(fwd, 2.0);
        }
        orbitControls.update();
      }
    }

    // Перелёт
    if (navAnimating) {
      navAnimProgress = Math.min(navAnimProgress + delta * 1.8, 1);
      const t = navAnimProgress < 0.5
        ? 4 * navAnimProgress ** 3
        : 1 - Math.pow(-2 * navAnimProgress + 2, 3) / 2;
      camera.position.lerpVectors(navAnimFrom.cam, navAnimTo.cam, t);
      orbitControls.target.lerpVectors(navAnimFrom.target, navAnimTo.target, t);
      orbitControls.update();
      if (navAnimProgress >= 1) { navAnimating = false; if (typeof onNavAnimEnd === 'function') onNavAnimEnd(); }
    }

    // Пульс reticle
    if (navReticle.visible) {
      const pulse = 0.6 + 0.4 * Math.sin(clock.elapsedTime * 4);
      navRing.material.opacity = pulse * 0.85;
    }

    // Пульс маркеров
    if (presetWaypoints.length > 0 && !renderer.xr.isPresenting) {
      const sp = 0.15 + 0.1 * Math.sin(clock.elapsedTime * 1.5);
      presetWaypoints.forEach(wp => {
        if (wp === hoveredWaypoint) return;
        wp.marker.children[0].material.opacity = sp * 1.8;
        wp.marker.children[1].material.opacity = sp * 2;
      });
    }

    // AR hit-test
    if (frame) {
      const session = renderer.xr.getSession();
      const refSpace = renderer.xr.getReferenceSpace();

      if (!hitTestSourceRequested && session) {
        hitTestSourceRequested = true;
        const arHint = document.getElementById('ar-hint');
        if (arHint) arHint.textContent = 'Initializing tracking...';
        session.requestReferenceSpace('viewer').then(vs => {
          return session.requestHitTestSource({ space: vs });
        }).then(src => {
          hitTestSource = src;
          if (arHint) arHint.textContent = 'Move phone slowly · point at floor';
        }).catch(err => {
          hitTestSourceRequested = false;
          const arHint = document.getElementById('ar-hint');
          if (arHint) { arHint.style.display = 'block'; arHint.textContent = 'HIT-TEST ERR: ' + (err && err.message ? err.message : String(err)); }
        });
      }

      if (hitTestSource && refSpace) {
        const results = frame.getHitTestResults(hitTestSource);
        if (results.length > 0) {
          const pose = results[0].getPose(refSpace);
          if (pose) {
            arReticle.visible = true;
            arReticle.matrix.fromArray(pose.transform.matrix);
            arReticle.matrixWorldNeedsUpdate = true;
            const arHint = document.getElementById('ar-hint');
            if (arHint) arHint.style.display = 'none';
          }
        } else {
          arReticle.visible = false;
        }
      }
    }

    constrainCamera();
    updateInfoHotspots();
    renderer.render(scene, camera);
  });

  // ── RESIZE ─────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
</script>
</body>
</html>
